{% extends "base.html" %}
{% block content %}
<div style="max-width: 600px; margin: 60px auto; padding: 0 20px; box-sizing: border-box; font-family: system-ui, sans-serif; text-align: center;">
    
    <div style="background-color: #0f172a; border: 1px solid #ef4444; padding: 40px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);">
        <div style="display: inline-flex; align-items: center; justify-content: center; w-16 h-14 rounded-full bg-rose-500/10 text-rose-400 font-bold text-2xl mb-4 p-4 border border-rose-500/20">
            ⚠️
        </div>
        <h1 style="margin: 0 0 10px 0; color: #ffffff; font-size: 24px; font-weight: 800;">Ledger Posting Operational Variance</h1>
        <p style="margin: 0 0 30px 0; color: #f87171; font-size: 13px; line-height: 1.6;">{{ error_message|default('The calculation arguments submitted violated database double-entry compliance validation check rules.') }}</p>
        
        <div style="display: flex; gap: 15px;">
            <a href="javascript:history.back()" style="display: inline-block; flex: 1; padding: 14px; border-radius: 8px; border: 1px solid #1f2937; background-color: #030712; color: #ffffff; text-decoration: none; font-weight: bold; font-size: 13px; text-transform: uppercase; box-sizing: border-box;">
                &larr; Re-Audit Inputs
            </a>
            <a href="/" style="display: inline-block; flex: 1; padding: 14px; border-radius: 8px; background-color: #4f46e5; color: #ffffff; text-decoration: none; font-weight: bold; font-size: 13px; text-transform: uppercase; box-sizing: border-box;">
                Workspace Home
            </a>
        </div>
    </div>

</div>
{% endblock %}
