{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-8">
    <div class="rounded-3xl border border-slate-800 bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950/20 p-8 shadow-2xl relative">
        <h2 class="text-2xl font-extrabold text-white mb-6">Initialize Company</h2>
        <form class="space-y-5" action="/select_company" method="POST">
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2">Company Name</label>
                <input name="name" type="text" required class="w-full px-4 py-3 rounded-xl border border-slate-800 bg-slate-950 text-white text-xs">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2">ABN Number</label>
                <input name="abn_number" type="text" required class="w-full px-4 py-3 rounded-xl border border-slate-800 bg-slate-950 text-white text-xs">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2">Contact Person</label>
                <input name="contact_person" type="text" class="w-full px-4 py-3 rounded-xl border border-slate-800 bg-slate-950 text-white text-xs">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2">Business Address</label>
                <input name="address" type="text" class="w-full px-4 py-3 rounded-xl border border-slate-800 bg-slate-950 text-white text-xs">
            </div>
            <button type="submit" class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 rounded-xl text-white font-bold text-xs uppercase tracking-wider">
                Initialize &rarr;
            </button>
        </form>
    </div>
</div>
{% endblock %}
