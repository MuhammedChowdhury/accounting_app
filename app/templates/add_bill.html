{% extends "base.html" %}
{% block content %}
<div style="max-width: 700px; margin: 40px auto; padding: 0 20px; box-sizing: border-box; font-family: system-ui, sans-serif; color: #fff;">
    
    <div style="background: linear-gradient(135deg, #0f172a 0%, #030712 100%); border-left: 4px solid #f87171; padding: 30px; border-radius: 12px; margin-bottom: 30px;">
        <h1 style="margin: 0; font-size: 24px; font-weight: 800;">Record Supplier Bill</h1>
        <p style="margin: 4px 0 0 0; color: #f87171; font-weight: bold; font-size: 12px;">Active Client: {{ company.name if company else 'Mih Chowdhury Test Client' }}</p>
    </div>

    <!-- This line has the correct address to process the bill data safely -->
    <form action="/view_bills?company_id={{ company.id if company else '' }}" method="POST" style="background-color: #0f172a; padding: 30px; border-radius: 12px; border: 1px solid #1f2937; display: flex; flex-direction: column; gap: 20px;">
        
        <div>
            <label style="display: block; font-size: 11px; font-weight: bold; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px;">Vendor Name *</label>
            <input name="vendor_name" type="text" required style="width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #334155; background-color: #030712; color: #fff; box-sizing: border-box;">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
                <label style="display: block; font-size: 11px; font-weight: bold; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px;">Bill Operational Date *</label>
                <input name="bill_date" type="date" required style="width: 100%; padding: 11px; border-radius: 6px; border: 1px solid #334155; background-color: #030712; color: #fff; height: 44px; box-sizing: border-box; font-size: 13px;">
            </div>
            <div>
                <label style="display: block; font-size: 11px; font-weight: bold; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px;">Payment Due Date *</label>
                <input name="due_date" type="date" required style="width: 100%; padding: 11px; border-radius: 6px; border: 1px solid #334155; background-color: #030712; color: #fff; height: 44px; box-sizing: border-box; font-size: 13px;">
            </div>
        </div>

        <div>
            <label style="display: block; font-size: 11px; font-weight: bold; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px;">Line Item Descriptions *</label>
            <textarea name="line_items" required style="width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #334155; background-color: #030712; color: #fff; box-sizing: border-box; font-size: 13px; min-height: 80px;"></textarea>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
                <label style="display: block; font-size: 11px; font-weight: bold; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px;">Total Amount (Inc. GST) *</label>
                <input name="total_amount" type="number" step="0.01" required style="width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #334155; background-color: #030712; color: #fff; box-sizing: border-box;">
            </div>
            <div>
                <label style="display: block; font-size: 11px; font-weight: bold; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px;">Expense Type</label>
                <select name="type_of_expense" style="width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #334155; background-color: #030712; color: #94a3b8; box-sizing: border-box; height: 44px;">
                    <option value="Cost of Goods Sold">Cost of Goods Sold</option>
                    <option value="Utilities">Utilities</option>
                    <option value="Rent">Rent / Premises</option>
                </select>
            </div>
        </div>

        <button type="submit" style="width: 100%; padding: 14px; border-radius: 8px; border: none; background-color: #dc2626; color: #fff; font-weight: bold; text-transform: uppercase; cursor: pointer; font-size: 13px;">Commit Bill to Ledger &rarr;</button>
    </form>
</div>
{% endblock %}
