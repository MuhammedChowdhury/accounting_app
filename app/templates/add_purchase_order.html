{% extends "base.html" %}
{% block content %}
<div style="max-width: 700px; margin: 40px auto; padding: 0 20px; box-sizing: border-box; font-family: system-ui, sans-serif; color: #fff;">
    
    <div style="background: linear-gradient(135deg, #0f172a 0%, #030712 100%); border-left: 4px solid #f59e0b; padding: 30px; border-radius: 12px; margin-bottom: 30px;">
        <h1 style="margin: 0; font-size: 24px; font-weight: 800;">Issue Supplier Purchase Order (PO)</h1>
        <p style="margin: 4px 0 0 0; color: #f59e0b; font-weight: bold; font-size: 12px;">Active Client: {{ company.name }}</p>
    </div>

    <form action="/add_purchase_order?company_id={{ company.id }}" method="POST" style="background-color: #0f172a; padding: 30px; border-radius: 12px; border: 1px solid #1f2937; display: flex; flex-direction: column; gap: 20px;">
        <div>
            <label style="display: block; font-size: 11px; font-weight: bold; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px;">Target Vendor / Supplier Name *</label>
            <input name="supplier_name" type="text" required style="width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #334155; background-color: #030712; color: #fff; box-sizing: border-box;">
        </div>
        
        <!-- ➕ THE ADDED COMPLIANCE OPERATIONAL DATE INPUT FIELD -->
        <div>
            <label style="display: block; font-size: 11px; font-weight: bold; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px;">Purchase Order Authorization Date *</label>
            <input name="po_date" type="date" required style="width: 100%; padding: 11px; border-radius: 6px; border: 1px solid #334155; background-color: #030712; color: #fff; box-sizing: border-box; height: 44px; font-size: 13px;">
        </div>

        <div>
            <label style="display: block; font-size: 11px; font-weight: bold; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px;">Item Inventory Spec Descriptions *</label>
            <textarea name="line_items" required style="width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #334155; background-color: #030712; color: #fff; box-sizing: border-box; min-height: 80px;"></textarea>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
                <label style="display: block; font-size: 11px; font-weight: bold; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px;">Order Valuation Amount ($) *</label>
                <input name="total_amount" type="number" step="0.01" required style="width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #334155; background-color: #030712; color: #fff; box-sizing: border-box;">
            </div>
            <div>
                <label style="display: block; font-size: 11px; font-weight: bold; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px;">Delivery Destination Address *</label>
                <input name="shipping_address" type="text" required style="width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #334155; background-color: #030712; color: #fff; box-sizing: border-box;">
            </div>
        </div>
        <button type="submit" style="width: 100%; padding: 14px; border-radius: 8px; border: none; background-color: #f59e0b; color: #000; font-weight: bold; text-transform: uppercase; cursor: pointer;">Authorize Purchase Order &rarr;</button>
    </form>
</div>
{% endblock %}
