<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Accounting Workspace</title>
    <script src="https://jsdelivr.net"></script>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-900 flex min-h-screen items-center justify-center p-6 antialiased">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl overflow-hidden p-8 border border-slate-200">
        <!-- Brand Header Section -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-slate-900 text-white font-bold text-xl mb-3 shadow-md">
                📊
            </div>
            <h2 class="text-2xl font-bold text-slate-900 tracking-tight">Welcome Back</h2>
            <p class="text-sm text-slate-500 mt-1">Access your secure compliance ledger account</p>
        </div>

        <!-- System Notification Messages Area -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="mb-4 p-4 rounded-xl bg-rose-50 border border-rose-100 text-sm text-rose-800 shadow-xs">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Interactive Credentials Capture Block -->
        <form action=/login method="POST" class="space-y-5">
            <div>
                <label for="username" class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-2">Username or Email</label>
                <input type="text" id="username" name="username" required autocomplete="username"
                       class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 text-slate-900 text-sm placeholder-slate-400 focus:outline-hidden focus:border-slate-900 focus:bg-white transition-all shadow-xs" 
                       placeholder="Enter your system identifier">
            </div>

            <div>
                <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-2">Security Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password"
                       class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 text-slate-900 text-sm placeholder-slate-400 focus:outline-hidden focus:border-slate-900 focus:bg-white transition-all shadow-xs" 
                       placeholder="••••••••••••">
            </div>

            <button type="submit" 
                    class="w-full py-3.5 rounded-xl bg-slate-900 text-white font-semibold text-sm hover:bg-slate-800 focus:outline-hidden transition-colors cursor-pointer shadow-md shadow-slate-900/10">
                Secure Authentication &rarr;
            </button>
        </form>

        <!-- Dynamic Shift Route Toggle Frame -->
        <div class="mt-8 pt-6 border-t border-slate-100 text-center text-sm text-slate-500">
            Don't have an operating account? 
            <a href="/register" class="font-semibold text-slate-900 hover:underline ml-1">Create one here</a>
        </div>
    </div>

</body>
</html>
