<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Accounting Workspace</title>
    <!-- Tailwind CSS Script Setup -->
    <script src="https://tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-900 flex min-h-screen items-center justify-center p-6 antialiased">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl overflow-hidden p-8 border border-slate-200">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-slate-900 text-white font-bold text-xl mb-3 shadow-md">
                💼
            </div>
            <h2 class="text-2xl font-bold text-slate-900 tracking-tight">Get Started</h2>
            <p class="text-sm text-slate-500 mt-1">Register your organization with our reporting suite</p>
        </div>

        <!-- System Notification Message Banner Alerts -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="mb-4 p-4 rounded-xl bg-rose-50 border border-rose-100 text-sm text-rose-800 shadow-xs">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Clean Unified Form Target Sending to user privilege engine rules -->
        <form action="/register" method="POST" class="space-y-5">
            <div>
                <label for="username" class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-2">Create Username</label>
                <input type="text" id="username" name="username" required autocomplete="username"
                       class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 text-slate-900 text-sm placeholder-slate-400 focus:outline-none focus:border-slate-900 focus:bg-white transition-all shadow-xs" 
                       placeholder="e.g., admin_accounting">
            </div>

            <div>
                <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-2">Security Password</label>
                <input type="password" id="password" name="password" required autocomplete="new-password"
                       class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 text-slate-900 text-sm placeholder-slate-400 focus:outline-none focus:border-slate-900 focus:bg-white transition-all shadow-xs" 
                       placeholder="Minimum 8 characters">
            </div>
            
            <!-- ➕ PROSTHETIC ROLE PRIVILEGES DROPDOWN (INTEGRATED CLEANLY) -->
            <div>
                <label for="role" class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-2">Access Privileges Role</label>
                <select id="role" name="role" 
                        class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 text-slate-900 text-sm focus:outline-none focus:border-slate-900 focus:bg-white transition-all shadow-xs h-[46px] cursor-pointer">
                    <option value="Admin">Firm Administrator (Full Root Access)</option>
                    <option value="Bookkeeper">Bookkeeper / Accountant (Data & Ledger Entry)</option>
                    <option value="Client">Client / Business Owner (Read-Only Reports Only)</option>
                </select>
            </div>

            <div class="pt-2">
                <button type="submit" 
                        class="w-full py-3.5 rounded-xl bg-slate-900 text-white font-semibold text-sm hover:bg-slate-800 focus:outline-none transition-colors cursor-pointer shadow-md shadow-slate-900/10">
                    Initialize System Core &rarr;
                </button>
            </div>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100 text-center text-sm text-slate-500">
            Already have an active workspace profile? 
            <a href="/login" class="font-semibold text-slate-900 hover:underline ml-1">Sign in here</a>
        </div>
    </div>

</body>
</html>
