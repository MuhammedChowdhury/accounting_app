{% extends "base.html" %}
{% block content %}
<div style="max-width: 600px; margin: 40px auto; padding: 20px; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif;">
    
    <div style="background: linear-gradient(135deg, #111827 0%, #1e1b4b 100%); border: 1px solid #1f2937; padding: 30px; border-radius: 16px; margin-bottom: 30px;">
        <h2 style="margin: 0 0 10px 0; color: #ffffff; font-size: 24px; font-weight: 800;">Onboard New Employee</h2>
        <p style="margin: 0; color: #9ca3af; font-size: 13px;">Type the worker's details below to register them into your database.</p>
    </div>

    <!-- Re-aligned form pointing to the backend payroll logic handler -->
    <form action="/payroll?company_id={{ company.id if company else '' }}" method="POST" style="background-color: #0f172a; padding: 30px; border-radius: 16px; border: 1px solid #1f2937; display: flex; flex-direction: column; gap: 20px;">
        <input type="hidden" name="action" value="create_employee">

        <!--  THE INSTANTIATED MISSING NAME SPACE INPUT BOX -->
        <div>
            <label style="display: block; font-size: 11px; font-weight: bold; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px;">Employee Full Legal Name *</label>
            <input name="name" type="text" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #1f2937; background-color: #030712; color: #fff; box-sizing: border-box; font-size: 13px;" placeholder="e.g. John Citizen">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
                <label style="display: block; font-size: 11px; font-weight: bold; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px;">Tax File Number (TFN)</label>
                <input name="tfn" type="text" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #1f2937; background-color: #030712; color: #fff; box-sizing: border-box; font-size: 13px;" placeholder="000 000 000">
            </div>
            <div>
                <label style="display: block; font-size: 11px; font-weight: bold; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px;">Employment Category</label>
                <select name="employment_type" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #1f2937; background-color: #030712; color: #fff; box-sizing: border-box; height: 45px; font-size: 13px;">
                    <option value="Full-Time">Full-Time (Permanent)</option>
                    <option value="Part-Time">Part-Time (Permanent)</option>
                    <option value="Casual">Casual / Irregular</option>
                </select>
            </div>
        </div>

        <div>
            <label style="display: block; font-size: 11px; font-weight: bold; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px;">TFN Declaration Status</label>
            <select name="tfn_declaration_status" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #1f2937; background-color: #030712; color: #fff; box-sizing: border-box; height: 45px; font-size: 13px;">
                <option value="Submitted">Submitted (Signed Digital Record Active)</option>
                <option value="Pending">Pending Document Collection</option>
            </select>
        </div>

        <button type="submit" style="width: 100%; padding: 14px; border-radius: 8px; border: none; background-color: #4f46e5; color: #fff; font-weight: bold; font-size: 13px; text-transform: uppercase; cursor: pointer; margin-top: 10px;">
            Commit Employee Profile Record &rarr;
        </button>
    </form>
</div>
{% endblock %}
